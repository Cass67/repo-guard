# repo-guard:rust:start
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all -- --check
        language: system
        files: \.rs$
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        files: \.rs$
        pass_filenames: false
      - id: cargo-audit
        name: cargo audit
        entry: cargo audit
        language: system
        files: \.rs$
        pass_filenames: false
# repo-guard:rust:end
