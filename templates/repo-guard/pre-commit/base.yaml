# repo-guard:base:start
  - repo: local
    hooks:
      - id: risky-filenames
        name: risky filenames
        entry: |-
          bash -lc '
            status=0
            for f in "$@"; do
              case "$f" in
                .env|.env.*|*.env|*env*|*.local|*.secret|*.secrets|*.token|*.tokens|*.pem|*.key|
                *.p12|*.pfx|*.crt|*.csr|*.ovpn|*.asc|*.kdbx|*.sqlite|*.sqlite3|*.db|*.rdb|
                *.bak|*.backup|*.gpg|*.age|id_rsa|id_rsa.*|id_ed25519|id_ed25519.*|known_hosts|
                authorized_keys|auth.json|auth.json.*|credentials|credentials.*|secrets|
                secrets.*|.npmrc|.pypirc|.netrc|.docker/config.json|.envrc|.aws/*|.ssh/*|
                .gnupg/*|.config/*|Library/Keychains/*|Library/Application\ Support/Google/Chrome/*|
                Library/Application\ Support/Chromium/*|
                Library/Application\ Support/BraveSoftware/*|
                Library/Application\ Support/Firefox/*|history.jsonl|sessions/*|log/*)
                  printf "refusing risky path=%s\n" "$f"
                  status=1
                  ;;
              esac
            done
            exit "$status"
          ' --
        language: system
      - id: merge-conflict
        name: merge conflict markers
        entry: >-
          bash -lc 'if [ "$#" -eq 0 ]; then exit 0; fi; rg -n --
          "^(<<<<<<<|=======|>>>>>>>)" "$@"; status=$?; if [ "$status" -eq
          1 ]; then exit 0; fi; exit "$status"'
        language: system
        types: [text]
      - id: trailing-whitespace
        name: trailing whitespace
        entry: >-
          bash -lc 'if [ "$#" -eq 0 ]; then exit 0; fi; rg -n --
          "[[:blank:]]$" "$@"; status=$?; if [ "$status" -eq 1 ]; then exit
          0; fi; exit "$status"'
        language: system
        types: [text]
      - id: detect-private-key
        name: private key markers
        entry: >-
          bash -lc 'if [ "$#" -eq 0 ]; then exit 0; fi; rg -n --
          "-----BEGIN ([A-Z0-9 ]+ )?PRIVATE KEY-----" "$@"; status=$?; if
          [ "$status" -eq 1 ]; then exit 0; fi; exit "$status"'
        language: system
        types: [text]
      - id: gitleaks
        name: gitleaks
        entry: gitleaks git --pre-commit --staged --redact
        language: system
        pass_filenames: false
# repo-guard:base:end
