name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: python -m pip install --upgrade pip pre-commit

      - name: Install shellcheck (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Install shellcheck (macOS)
        if: runner.os == 'macOS'
        run: brew install shellcheck

      - name: Shellcheck
        run: shellcheck bin/repo-guard tests/*.sh

      - name: Smoke test
        run: ./tests/smoke.sh

      - name: Detect test
        run: ./tests/detect.sh

      - name: Language matrix test
        run: ./tests/language-matrix.sh
